<!DOCTYPE html>
<html>
<head>
    <title>Formulario</title>
    <style>
        body {
            font-family: Arial;
            margin: 40px;
        }

        form {
            max-width: 400px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }

        button {
            padding: 10px 15px;
        }

        .error {
            color: red;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<h1>Formulario Estudiante</h1>

<div class="error" th:text="${error}"></div>

<form th:action="@{/estudiantes}" method="post" th:object="${estudiante}">

    <input type="hidden" th:field="*{id}" />

    <div class="form-group">
        <label>Nombre</label>
        <input type="text" th:field="*{nombre}" />
    </div>

    <div class="form-group">
        <label>Direccion</label>
        <input type="text" th:field="*{direccion}" />
    </div>

    <div class="form-group">
        <label>Telefono</label>
        <input type="text" th:field="*{telefono}" />
    </div>

    <div class="form-group">
        <label>Email</label>
        <input type="text" th:field="*{email}" />
    </div>

    <button type="submit">Guardar</button>
</form>

<br>
<a href="/estudiantes">Volver</a>

</body>
</html>
